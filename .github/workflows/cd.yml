name: Continuous Deployment

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Include ecosystem config in artifact
        run: cp ecosystem.config.cjs .output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: .output/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: ./artifact

      - name: SCP Artifact to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: ./artifact
          target: '~/deploys/${{ github.sha }}'

      - name: Switch Symlink and Reload
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            export PATH="${{ secrets.SERVER_BIN_PATH }}:$PATH"
            ln -sfn ~/deploys/${{ github.sha }}/artifact ~/htdocs/${{ secrets.SERVER_DOMAIN }}/current
            pm2 reload betterlaspinas || pm2 start ~/htdocs/${{ secrets.SERVER_DOMAIN }}/current/ecosystem.config.cjs
            ls -dt ~/deploys/*/ | tail -n +6 | xargs -r rm -rf
