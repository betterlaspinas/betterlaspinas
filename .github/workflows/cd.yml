name: Continuous Deployment
permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            # 1. Setup PATH
            # Required for Node-based tools (pnpm, pm2) to find 'node' via their shebangs.
            export PATH="${{ secrets.SERVER_BIN_PATH }}:$PATH"

            # 2. Navigate and Fetch/Reset
            # Using reset --hard instead of pull to resolve branch divergence and force-pushes.
            cd ~/htdocs/${{ secrets.SERVER_DOMAIN }}
            git fetch --tags origin ${{ github.ref_name }}
            git reset --hard FETCH_HEAD

            # 3. Install, Build, and Restart
            pnpm install --frozen-lockfile
            pnpm build
            pm2 reload betterlaspinas || NITRO_PORT=${{ secrets.APP_PORT || 3000 }} pm2 start ecosystem.config.cjs
