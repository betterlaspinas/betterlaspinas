version: 2
updates:
  - package-ecosystem: npm        # reads pnpm-lock.yaml
    directory: /
    schedule:
      interval: monthly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
